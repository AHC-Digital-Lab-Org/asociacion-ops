name: 🚀 Reusable CI/CD Pipeline Streamlit

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string # Espera 'node' o 'python'
      node_version:
        required: false
        type: string
        default: '24'
      python_version:
        required: false
        type: string
        default: '3.10'

jobs:
  quality-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      # --- CAPA 1: CONFIGURACIÓN SEGÚN INPUT ---

      # Configuración si el lenguaje es NODE
      - name: 🟢 Setup Node.js
        if: ${{ inputs.language == 'node' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: 📦 Install Node Deps
        if: ${{ inputs.language == 'node' }}
        run: npm install

      # Configuración si el lenguaje es PYTHON
      - name: 🐍 Setup Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'

      - name: 📦 Install Python Deps
        if: ${{ inputs.language == 'python' }}
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install -e ".[test,dev]"
        

      # --- CAPA 3: TESTS (CONTRATO UNIVERSAL) ---
      # El desarrollador debe definir "test" en su package.json
      - name: 🧪 Run Tests
        run: |
          npm test
          npm run lint

      # --- CAPA 4: CONSTRUCCIÓN (CAJA NEGRA) ---
      - name: 🏗️ Build Project
        run: npm run build
